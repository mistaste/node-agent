name: guardex-node

services:
  xray:
    # Pin close to the xray-core the Flutter app's proxy_core bundles
    # (GFW-knocker fork v1.26.5-mahsa, based on upstream 26.5). Reality handshakes
    # only succeed when client and server speak the same protocol generation —
    # bump this in lockstep with proxy_core's xray-core.
    image: ghcr.io/xtls/xray-core:26.6.1
    restart: unless-stopped
    network_mode: host
    # Run as root: the image drops to a non-privileged user that cannot bind the
    # VLESS port 443 (<1024). Root keeps the default NET_BIND_SERVICE capability.
    user: "0:0"
    command: run -config /etc/xray/config.json
    volumes:
      - ./xray-config.json:/etc/xray/config.json:ro
      # Node-agent creates durable per-profile TLS keypairs; Xray only reads them.
      - ./data/tls:/etc/guardex/tls:ro

  node-agent:
    build: .
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      XRAY_CORE_VERSION: "26.6.1"
      HYSTERIA_TLS_DIR: "/etc/guardex/tls"
    volumes:
      # Durable user and dynamic-inbound stores — survive container/Xray restarts.
      - ./data:/data
      # Writable only in the agent; private keys are never sent to the controller.
      - ./data/tls:/etc/guardex/tls
      # Enables controlled git-based self-update from the admin panel.
      - ./:/opt/guardex-node
      - /var/run/docker.sock:/var/run/docker.sock
